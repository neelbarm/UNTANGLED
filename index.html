    <meta name="theme-color" content="#000000" />
    <script>
      // Apply saved theme before paint to avoid a flash. Defaults to dark.
      try {
        if (JSON.parse(localStorage.getItem('sixty:theme')) !== 'light') {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    </script>
