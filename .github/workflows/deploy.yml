name: Deploy to GitHub Pages

# Builds the Vite app and publishes the static site to the `gh-pages` branch.
# Point Settings → Pages → "Deploy from a branch" at gh-pages / (root).
# Uses the deploy-from-branch model so it works from a non-default branch
# without hitting github-pages environment protection rules.

on:
  push:
    branches: [claude/repo-cleanup-gverb0]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:pages

      - name: Prepare artifact
        run: touch dist/.nojekyll

      - name: Publish to gh-pages
        run: |
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA} to GitHub Pages"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
